loki:
  auth_enabled: false
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  ingester:
    chunk_encoding: snappy
  analytics:
    reporting_enabled: false

deploymentMode: SimpleScalable

read:
  replicas: 1
write:
  replicas: 1
  persistence:
    size: 1Gi
backend:
  replicas: 1
  persistence:
    size: 1Gi

ignoreMinioDeprecation: true
minio:
  enabled: true
  persistence:
    size: 1Gi

memcachedExporter:
  enabled: false

gateway:
  enabled: false
